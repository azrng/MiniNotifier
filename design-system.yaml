# 设计与组件规则的唯一事实来源。
# 该文件面向人和 AI 共同使用：可读、可解析、非可执行、易于比对。
# 技术栈：React + Tailwind CSS + Radix Primitive + cva + Tauri 2

meta:
  name: "桌面效率工具设计系统"
  version: "1.0.0"
  status: "启用中"
  owners:
    - "design"
    - "frontend"
    - "desktop"
  tech_stack:
    styling: "Tailwind CSS（唯一样式体系）"
    primitives: "Radix UI Primitive"
    variants: "class-variance-authority + clsx + tailwind-merge"
    forms: "React Hook Form + Zod"
    query: "TanStack Query"
    local_bridge: "Tauri Command / event / plugin"
  usage:
    read_order:
      - "在进行任何 UI 改动前阅读本文件"
      - "再查看现有页面与组件实现"
      - "最后再落具体代码"
    principles:
      - "优先复用，而不是重新发明"
      - "优先使用 token 与组件变体，而不是硬编码视觉值"
      - "优先保持桌面效率感和信息清晰度，而不是堆砌装饰"
      - "桌面应用以稳定、可读、可扫描为先"

product:
  style_keywords:
    - "清晰"
    - "冷静"
    - "高效"
    - "可信"
    - "克制"
  ui_goal:
    - "界面适合长时间桌面使用，不追求移动端式大留白"
    - "操作路径明确，反馈即时，错误可恢复"

tokens:
  colors:
    primary:
      50: "#eff6ff"
      100: "#dbeafe"
      200: "#bfdbfe"
      300: "#93c5fd"
      400: "#60a5fa"
      500: "#2563eb"
      600: "#1d4ed8"
      700: "#1e40af"
      800: "#1e3a8a"
      900: "#172554"
    success:
      500: "#16a34a"
    warning:
      500: "#d97706"
    error:
      500: "#dc2626"
    gray:
      50: "#f8fafc"
      100: "#f1f5f9"
      200: "#e2e8f0"
      300: "#cbd5e1"
      400: "#94a3b8"
      500: "#64748b"
      600: "#475569"
      700: "#334155"
      800: "#1e293b"
      900: "#0f172a"
  typography:
    font_family:
      sans: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      mono: "'JetBrains Mono', ui-monospace, SFMono-Regular, monospace"
    font_size:
      xs: "12px"
      sm: "14px"
      base: "16px"
      lg: "18px"
      xl: "20px"
      2xl: "24px"
    font_weight:
      normal: 400
      medium: 500
      semibold: 600
      bold: 700
  spacing:
    1: "4px"
    2: "8px"
    3: "12px"
    4: "16px"
    5: "20px"
    6: "24px"
    8: "32px"
    10: "40px"
    12: "48px"
  radius:
    sm: "6px"
    md: "8px"
    lg: "12px"
    xl: "16px"
  shadow:
    sm: "0 1px 2px rgba(15, 23, 42, 0.06)"
    md: "0 8px 24px rgba(15, 23, 42, 0.08)"
    lg: "0 16px 40px rgba(15, 23, 42, 0.12)"

layout:
  shell:
    sidebar_width: "240px"
    content_max_width: "none"
    page_padding: "24px"
    section_gap: "24px"
  rules:
    - "桌面主界面默认采用侧边导航 + 顶部操作区 + 内容区"
    - "复杂页面优先分区显示，不用超长单列堆叠"
    - "长列表页优先给出筛选区、表格区、详情区的明确层次"

page_states:
  required:
    - "loading"
    - "empty"
    - "error"
    - "no-permission"
  guidance:
    loading: "使用骨架屏或局部 loading，不用全页闪烁"
    empty: "显示简短说明与下一步操作"
    error: "说明错误原因并提供重试入口"
    no_permission: "清晰表达权限不足，不泄露内部细节"

component_rules:
  reuse_first: true
  naming:
    components: "PascalCase"
    hooks: "camelCase，以 use 开头"
    stores: "camelCase，以 use 开头，以 Store 结尾"
  categories:
    layout:
      examples:
        - "AppShell"
        - "SidebarNav"
        - "PageHeader"
    primitives:
      examples:
        - "Button"
        - "Input"
        - "Select"
        - "Dialog"
        - "DropdownMenu"
        - "Tooltip"
        - "Tabs"
        - "Table"
        - "Toast"
    business:
      examples:
        - "ProfileCard"
        - "CommandList"
        - "RuleEditor"
        - "WorkspacePicker"

form_rules:
  layout:
    label_position: "标签在输入框上方"
    field_gap: "16px"
    section_gap: "24px"
  validation:
    source: "Zod schema"
    trigger: "失焦校验为主，提交时全量校验"
  submit_behavior:
    loading_state: "提交按钮必须有 loading 与防重复提交"

do:
  - "优先复用 components/ui 中的基础组件"
  - "使用 Tailwind token 与组件变体控制视觉"
  - "把表单 schema 收敛到 Zod"
  - "把异步数据状态收敛到 TanStack Query"
  - "把纯客户端全局状态收敛到 Zustand"
  - "通过 Tauri Command / event 与 Rust 通信"

dont:
  - "不要硬编码颜色、阴影、圆角、断点"
  - "不要直接在页面中散落 invoke 调用"
  - "不要把可由 Query 管理的数据长期塞进 Zustand"
  - "不要默认引入本地 HTTP 网关层"
  - "不要为了单次需求做过度组件抽象"
