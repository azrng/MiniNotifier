name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'src/MiniNotifier.Avalonia/MiniNotifier.Avalonia.csproj'
  AOT_PROFILE: 'NativeAot-win-x64'
  AOT_OUTPUT: 'src/MiniNotifier.Avalonia/bin/Release/net10.0-windows10.0.19041.0/publish/win-x64-aot'
  SINGLE_FILE_PROFILE: 'SingleFile-win-x64'
  SINGLE_FILE_OUTPUT: 'src/MiniNotifier.Avalonia/bin/Release/net10.0-windows10.0.19041.0/publish/win-x64-single-file'
  APP_NAME: 'MiniNotifier'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build project
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

    - name: Generate release metadata
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: release_meta
      shell: pwsh
      run: |
        $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
        $shortSha = "${{ github.sha }}".Substring(0, 7)
        $tag = "build-$timestamp-$shortSha"
        $releaseName = "MiniNotifier Latest Build"
        "tag_name=$tag" >> $env:GITHUB_OUTPUT
        "release_name=$releaseName" >> $env:GITHUB_OUTPUT

    - name: Publish Windows x64 Native AOT
      shell: pwsh
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          --configuration Release `
          /p:PublishProfile=${{ env.AOT_PROFILE }}

    - name: Verify Native AOT publish output
      shell: pwsh
      run: |
        $exePath = Join-Path "${{ env.AOT_OUTPUT }}" "MiniNotifier.Avalonia.exe"
        if (-not (Test-Path $exePath)) {
          throw "Native AOT publish output missing executable: $exePath"
        }

        Get-Item $exePath | Format-List FullName,Length,LastWriteTime

    - name: Publish Windows x64 Single File
      shell: pwsh
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          --configuration Release `
          /p:PublishProfile=${{ env.SINGLE_FILE_PROFILE }}

    - name: Verify Single File publish output
      shell: pwsh
      run: |
        $publishDir = "${{ env.SINGLE_FILE_OUTPUT }}"
        $exePath = Join-Path $publishDir "MiniNotifier.Avalonia.exe"
        if (-not (Test-Path $exePath)) {
          throw "Single-file publish output missing executable: $exePath"
        }

        $files = Get-ChildItem -Path $publishDir -File
        if ($files.Count -ne 1) {
          throw "Single-file publish output should contain exactly one file, found $($files.Count)."
        }

        Get-Item $exePath | Format-List FullName,Length,LastWriteTime

    - name: Create ZIP packages
      shell: pwsh
      run: |
        Compress-Archive -Path "${{ env.AOT_OUTPUT }}/*" -DestinationPath MiniNotifier-win-x64-aot.zip
        Compress-Archive -Path "${{ env.SINGLE_FILE_OUTPUT }}/*" -DestinationPath MiniNotifier-win-x64-single-file.zip

    - name: Verify ZIP packages
      shell: pwsh
      run: |
        foreach ($zipPath in @("MiniNotifier-win-x64-aot.zip", "MiniNotifier-win-x64-single-file.zip")) {
          if (-not (Test-Path $zipPath)) {
            throw "Release ZIP package was not created: $zipPath"
          }

          Get-Item $zipPath | Format-List FullName,Length,LastWriteTime
        }

    - name: Upload artifacts - win-x64-aot
      uses: actions/upload-artifact@v4
      with:
        name: MiniNotifier-win-x64-aot
        path: MiniNotifier-win-x64-aot.zip
        retention-days: 30

    - name: Upload artifacts - win-x64-single-file
      uses: actions/upload-artifact@v4
      with:
        name: MiniNotifier-win-x64-single-file
        path: MiniNotifier-win-x64-single-file.zip
        retention-days: 30

    - name: Create release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_meta.outputs.tag_name }}
        name: ${{ steps.release_meta.outputs.release_name }}
        target_commitish: ${{ github.sha }}
        files: |
          MiniNotifier-win-x64-aot.zip
          MiniNotifier-win-x64-single-file.zip
        draft: false
        prerelease: false
        generate_release_notes: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
