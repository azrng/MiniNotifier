name: Build and Package

on:
  push:
    branches:
      - main
      - tauri-rust
      - feat/tauri-rust
  pull_request:
    branches:
      - main
      - tauri-rust
      - feat/tauri-rust
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '24.15.0'
  PROJECT_PATH: 'src/MiniNotifier/MiniNotifier.csproj'
  APP_NAME: 'MiniNotifier'
  # 可选值：wpf / tauri。修改这里即可切换当前发布目标。
  PUBLISH_TARGET: 'tauri'

jobs:
  build-wpf:
    if: ${{ env.PUBLISH_TARGET == 'wpf' }}
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build project
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

    - name: Generate WPF release metadata
      if: github.event_name == 'push'
      id: wpf_release_meta
      shell: pwsh
      run: |
        $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
        $shortSha = "${{ github.sha }}".Substring(0, 7)
        $tag = "wpf-build-$timestamp-$shortSha"
        $releaseName = "MiniNotifier WPF Build"
        "tag_name=$tag" >> $env:GITHUB_OUTPUT
        "release_name=$releaseName" >> $env:GITHUB_OUTPUT

    - name: Publish Windows x64
      shell: pwsh
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          --output publish/win-x64 `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:EnableCompressionInSingleFile=true `
          -p:DebugType=embedded `
          -p:PublishReadyToRun=false `
          -p:PublishTrimmed=false

    - name: Publish Windows x86
      shell: pwsh
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          --configuration Release `
          --runtime win-x86 `
          --self-contained true `
          --output publish/win-x86 `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:EnableCompressionInSingleFile=true `
          -p:DebugType=embedded `
          -p:PublishReadyToRun=false `
          -p:PublishTrimmed=false

    - name: Publish Framework-Dependent
      shell: pwsh
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          --configuration Release `
          --self-contained false `
          --output publish/framework-dependent `
          -p:PublishSingleFile=false `
          -p:DebugType=embedded `
          -p:PublishReadyToRun=false `
          -p:PublishTrimmed=false

    - name: Create ZIP packages
      shell: pwsh
      run: |
        Compress-Archive -Path publish/win-x64/* -DestinationPath MiniNotifier-win-x64.zip
        Compress-Archive -Path publish/win-x86/* -DestinationPath MiniNotifier-win-x86.zip
        Compress-Archive -Path publish/framework-dependent/* -DestinationPath MiniNotifier-framework-dependent.zip

    - name: Upload artifacts - x64
      uses: actions/upload-artifact@v4
      with:
        name: MiniNotifier-win-x64
        path: MiniNotifier-win-x64.zip
        retention-days: 30

    - name: Upload artifacts - x86
      uses: actions/upload-artifact@v4
      with:
        name: MiniNotifier-win-x86
        path: MiniNotifier-win-x86.zip
        retention-days: 30

    - name: Upload artifacts - framework-dependent
      uses: actions/upload-artifact@v4
      with:
        name: MiniNotifier-framework-dependent
        path: MiniNotifier-framework-dependent.zip
        retention-days: 30

    - name: Create WPF release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.wpf_release_meta.outputs.tag_name }}
        name: ${{ steps.wpf_release_meta.outputs.release_name }}
        target_commitish: ${{ github.sha }}
        files: |
          MiniNotifier-win-x64.zip
          MiniNotifier-win-x86.zip
          MiniNotifier-framework-dependent.zip
        draft: false
        prerelease: false
        generate_release_notes: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    if: ${{ env.PUBLISH_TARGET == 'tauri' }}
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install frontend dependencies
      run: npm ci

    - name: Build Tauri bundle
      run: npx tauri build

    - name: Generate Tauri release metadata
      if: github.event_name == 'push'
      id: tauri_release_meta
      shell: pwsh
      run: |
        $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
        $shortSha = "${{ github.sha }}".Substring(0, 7)
        $tag = "tauri-build-$timestamp-$shortSha"
        $releaseName = "MiniNotifier Tauri Build"
        "tag_name=$tag" >> $env:GITHUB_OUTPUT
        "release_name=$releaseName" >> $env:GITHUB_OUTPUT

    - name: Upload artifacts - Tauri MSI
      uses: actions/upload-artifact@v4
      with:
        name: MiniNotifier-tauri-msi
        path: src-tauri/target/release/bundle/msi/*.msi
        retention-days: 30

    - name: Upload artifacts - Tauri NSIS
      uses: actions/upload-artifact@v4
      with:
        name: MiniNotifier-tauri-nsis
        path: src-tauri/target/release/bundle/nsis/*.exe
        retention-days: 30

    - name: Create Tauri release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tauri_release_meta.outputs.tag_name }}
        name: ${{ steps.tauri_release_meta.outputs.release_name }}
        target_commitish: ${{ github.sha }}
        files: |
          src-tauri/target/release/bundle/msi/*.msi
          src-tauri/target/release/bundle/nsis/*.exe
        draft: false
        prerelease: true
        generate_release_notes: true
        make_latest: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
