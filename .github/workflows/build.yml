name: Build and Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'src/MiniNotifier.Avalonia/MiniNotifier.Avalonia.csproj'
  PUBLISH_PROFILE: 'NativeAot-win-x64'
  PUBLISH_OUTPUT: 'src/MiniNotifier.Avalonia/bin/Release/net10.0-windows10.0.19041.0/publish/win-x64-aot'
  APP_NAME: 'MiniNotifier'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build project
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

    - name: Generate release metadata
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      id: release_meta
      shell: pwsh
      run: |
        $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
        $shortSha = "${{ github.sha }}".Substring(0, 7)
        $tag = "build-$timestamp-$shortSha"
        $releaseName = "MiniNotifier Latest Build"
        "tag_name=$tag" >> $env:GITHUB_OUTPUT
        "release_name=$releaseName" >> $env:GITHUB_OUTPUT

    - name: Publish Windows x64 Native AOT
      shell: pwsh
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          --configuration Release `
          /p:PublishProfile=${{ env.PUBLISH_PROFILE }}

    - name: Create ZIP packages
      shell: pwsh
      run: |
        Compress-Archive -Path "${{ env.PUBLISH_OUTPUT }}/*" -DestinationPath MiniNotifier-win-x64-aot.zip

    - name: Upload artifacts - win-x64-aot
      uses: actions/upload-artifact@v4
      with:
        name: MiniNotifier-win-x64-aot
        path: MiniNotifier-win-x64-aot.zip
        retention-days: 30

    - name: Create release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_meta.outputs.tag_name }}
        name: ${{ steps.release_meta.outputs.release_name }}
        target_commitish: ${{ github.sha }}
        files: |
          MiniNotifier-win-x64-aot.zip
        draft: false
        prerelease: false
        generate_release_notes: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
